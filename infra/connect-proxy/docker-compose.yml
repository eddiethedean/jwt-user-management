services:
  connect_proxy:
    image: nginx:1.27-alpine
    ports:
      - "${PROXY_PORT:-8080}:8080"
    environment:
      # e.g. host.docker.internal
      BACKEND_HOST: ${BACKEND_HOST:-host.docker.internal}
      BACKEND_PORT: ${BACKEND_PORT:-8001}
      PROXY_PREFIX: ${PROXY_PREFIX:-/connect/app}
      PROXY_MODE: ${PROXY_MODE:-preserve} # preserve|strip
    volumes:
      - ./nginx_preserve.conf.template:/etc/nginx/templates/preserve.conf.template:ro
      - ./nginx_strip.conf.template:/etc/nginx/templates/strip.conf.template:ro
    command:
      - /bin/sh
      - -c
      - >-
        tpl="/etc/nginx/templates/preserve.conf.template";
        if [ "$$PROXY_MODE" = "strip" ]; then tpl="/etc/nginx/templates/strip.conf.template"; fi;
        envsubst '$$BACKEND_HOST $$BACKEND_PORT $$PROXY_PREFIX'
        < "$$tpl"
        > /etc/nginx/conf.d/default.conf;
        nginx -g 'daemon off;'
