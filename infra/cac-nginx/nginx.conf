events {}

http {
  # minimal defaults
  sendfile on;
  resolver 127.0.0.11 ipv6=off valid=10s;

  upstream user_management_api {
    zone user_management_api 64k;
    # docker compose service name
    server user-management-api:8001 resolve;
    keepalive 32;
  }

  server {
    listen 8443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # CAC client cert validation (mTLS)
    ssl_client_certificate /etc/nginx/certs/dod_ca_bundle.pem;
    # Request a client certificate but don't require it globally.
    # We'll enforce verification only on /auth/cac/*.
    ssl_verify_client optional;
    ssl_verify_depth 5;

    # Optional revocation (CRL). If you don't have a bundle, comment this out.
    ssl_crl /etc/nginx/certs/dod_crl_bundle.pem;

    # Security hygiene: never trust incoming client-supplied identity headers.
    proxy_set_header X-SSL-Client-Verify "";
    proxy_set_header X-SSL-Client-S-DN "";
    proxy_set_header X-SSL-Client-I-DN "";
    proxy_set_header X-SSL-Client-Serial "";
    proxy_set_header X-SSL-Client-Cert "";
    proxy_set_header X-Forwarded-Client-Cert "";

    # Enforce CAC only on these endpoints.
    location ^~ /auth/cac/ {
      if ($ssl_client_verify != SUCCESS) {
        return 401;
      }

      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Forward verified identity (nginx-generated values).
      proxy_set_header X-SSL-Client-Verify $ssl_client_verify;
      proxy_set_header X-SSL-Client-S-DN $ssl_client_s_dn;
      proxy_set_header X-SSL-Client-I-DN $ssl_client_i_dn;
      proxy_set_header X-SSL-Client-Serial $ssl_client_serial;
      proxy_set_header X-SSL-Client-Cert $ssl_client_escaped_cert;

      proxy_pass http://user_management_api;
    }

    location / {
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Forward identity headers (nginx-generated values). These will be empty
      # unless a client cert was presented.
      proxy_set_header X-SSL-Client-Verify $ssl_client_verify;
      proxy_set_header X-SSL-Client-S-DN $ssl_client_s_dn;
      proxy_set_header X-SSL-Client-I-DN $ssl_client_i_dn;
      proxy_set_header X-SSL-Client-Serial $ssl_client_serial;
      proxy_set_header X-SSL-Client-Cert $ssl_client_escaped_cert;

      proxy_pass http://user_management_api;
    }
  }
}

