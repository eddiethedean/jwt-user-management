services:
  user-management-api:
    image: python:3.10-slim
    working_dir: /app
    volumes:
      - ../../user_management_api:/app:rw
    command: >
      bash -lc "
      python -m venv /venv &&
      source /venv/bin/activate &&
      pip install -U pip &&
      pip install -r requirements.txt &&
      alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8001
      "
    expose:
      - "8001"

  nginx:
    image: nginx:1.27
    depends_on:
      - user-management-api
    ports:
      - "8443:8443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro

