<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Reset password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="{{ base_path|default('') }}/static/site/forms.css" />
  </head>
  <body>
    <div class="page">
      <div class="card">
        <h1>Reset password</h1>
        <p class="muted">Choose a new password for your account.</p>

        {% if error %}
          <div class="notice notice--error">{{ error }}</div>
        {% endif %}
        {% if success %}
          <div class="notice notice--success">Password updated. You can close this page.</div>
        {% endif %}

        <form method="post" action="{{ base_path|default('') }}/password/reset-form">
          <input type="hidden" name="token" value="{{ token }}" />
          <label>
            New password
            <input name="password" type="password" required autocomplete="new-password" />
          </label>
          <button type="submit">Reset password</button>
        </form>
      </div>
    </div>
  </body>
</html>
