<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Reset password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body style="font-family: system-ui, -apple-system, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 16px;">
    <h2>Reset password</h2>

    {% if error %}
      <p style="color: #b91c1c;">{{ error }}</p>
    {% endif %}
    {% if success %}
      <p style="color: #15803d;">Password updated. You can close this page.</p>
    {% endif %}

    <form method="post" action="{{ base_path|default('') }}/password/reset-form">
      <input type="hidden" name="token" value="{{ token }}" />
      <label>
        New password
        <input name="password" type="password" required style="display:block; width:100%; padding:10px; margin-top:6px;" />
      </label>
      <button type="submit" style="margin-top: 12px; padding: 10px 14px;">Reset</button>
    </form>
  </body>
</html>
