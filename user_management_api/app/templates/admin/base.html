<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Admin{% endblock %}</title>
    {% if csrf_token %}
      <meta name="csrf-token" content="{{ csrf_token }}" />
    {% endif %}
    <meta name="base-path" content="{{ base_path|default('') }}" />
    <link rel="stylesheet" href="{{ base_path|default('') }}/static/admin/admin.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__brand">User management</div>
      {% block topbar %}{% endblock %}
    </header>

    <main class="container">
      {% block content %}{% endblock %}
    </main>

    <script src="{{ base_path|default('') }}/static/admin/admin.js" defer></script>
  </body>
</html>
