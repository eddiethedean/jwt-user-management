<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Accept invite</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="{{ base_path|default('') }}/static/site/forms.css" />
  </head>
  <body>
    <div class="page">
      <div class="card">
        <h1>Accept invite</h1>
        <p class="muted">Set your password to activate your account.</p>

        {% if error %}
          <div class="notice notice--error">{{ error }}</div>
        {% endif %}
        {% if success %}
          <div class="notice notice--success">Invite accepted. You can close this page.</div>
        {% endif %}

        <form method="post" action="{{ base_path|default('') }}/invites/accept-form">
          <input type="hidden" name="token" value="{{ token }}" />
          <label>
            Full name (optional)
            <input name="full_name" type="text" autocomplete="name" />
          </label>
          <label>
            Password
            <input name="password" type="password" required autocomplete="new-password" />
          </label>
          <button type="submit">Accept invite</button>
        </form>
      </div>
    </div>
  </body>
</html>
