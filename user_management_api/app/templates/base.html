<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}User Management{% endblock %}</title>
    <style>
      :root {
        --bg: #0b1020;
        --panel: rgba(255, 255, 255, 0.06);
        --panel-strong: rgba(255, 255, 255, 0.1);
        --fg: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.72);
        --border: rgba(255, 255, 255, 0.14);
        --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        --radius: 14px;
        --radius-sm: 10px;
        --accent: #7c7cff;
        --accent-2: #22c55e;
        --danger: #fb7185;
      }

      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f6f7fb;
          --panel: rgba(255, 255, 255, 0.9);
          --panel-strong: rgba(255, 255, 255, 1);
          --fg: rgba(9, 10, 18, 0.92);
          --muted: rgba(9, 10, 18, 0.64);
          --border: rgba(9, 10, 18, 0.12);
          --shadow: 0 10px 30px rgba(16, 24, 40, 0.12);
          --accent: #4f46e5;
          --accent-2: #16a34a;
          --danger: #e11d48;
        }
      }

      * { box-sizing: border-box; }
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        color: var(--fg);
        background: radial-gradient(1200px 600px at 20% -10%, rgba(124, 124, 255, 0.25), transparent 60%),
                    radial-gradient(800px 500px at 90% 10%, rgba(34, 197, 94, 0.18), transparent 55%),
                    var(--bg);
        margin: 0;
      }

      a { color: inherit; text-decoration: none; }
      a:hover { text-decoration: underline; }

      .wrap { max-width: 860px; margin: 40px auto; padding: 0 18px 48px; }
      .topbar {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: center;
        margin-bottom: 18px;
      }
      .brand { display: flex; flex-direction: column; gap: 2px; }
      .brandTitle { font-weight: 900; letter-spacing: -0.02em; font-size: 18px; }
      .brandSub { color: var(--muted); font-size: 13px; }

      .nav { display: flex; gap: 10px; flex-wrap: wrap; }
      .nav a {
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--panel);
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 18px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(10px);
      }

      h2, h3 { margin: 0; letter-spacing: -0.02em; }
      h2 { font-size: 22px; margin-bottom: 10px; }
      h3 { font-size: 16px; margin: 18px 0 8px; color: var(--fg); }

      .muted { color: var(--muted); font-size: 13px; }
      .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

      label { display: block; margin: 12px 0 6px; font-weight: 650; }
      input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        font-size: 14px;
        background: var(--panel-strong);
        color: var(--fg);
        outline: none;
      }
      input::placeholder { color: color-mix(in srgb, var(--muted) 70%, transparent); }
      input:focus { border-color: color-mix(in srgb, var(--accent) 70%, var(--border)); box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 18%, transparent); }

      button {
        margin-top: 12px;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        background: linear-gradient(180deg, color-mix(in srgb, var(--panel-strong) 90%, transparent), var(--panel));
        color: var(--fg);
        cursor: pointer;
        font-weight: 650;
      }
      button:hover { border-color: color-mix(in srgb, var(--accent) 60%, var(--border)); }

      .pillRow a { text-decoration: none; }
      .pillRow a:hover { text-decoration: none; }

      .err, .ok, .info {
        margin-top: 10px;
        padding: 10px 12px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
        background: var(--panel-strong);
      }
      .err { border-color: color-mix(in srgb, var(--danger) 55%, var(--border)); background: color-mix(in srgb, var(--danger) 14%, var(--panel-strong)); }
      .ok { border-color: color-mix(in srgb, var(--accent-2) 55%, var(--border)); background: color-mix(in srgb, var(--accent-2) 12%, var(--panel-strong)); }

      code, pre {
        background: color-mix(in srgb, var(--panel-strong) 92%, transparent);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 2px 6px;
      }
      pre { padding: 12px; overflow: auto; }

      table { width: 100%; border-collapse: collapse; overflow: hidden; border-radius: var(--radius-sm); }
      th, td { padding: 10px 10px; border-bottom: 1px solid var(--border); text-align: left; }
      thead th { font-size: 12px; color: var(--muted); font-weight: 750; letter-spacing: 0.02em; text-transform: uppercase; }
      tbody tr:hover { background: color-mix(in srgb, var(--panel-strong) 65%, transparent); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="topbar">
        <div class="brand">
          <div class="brandTitle">User Management</div>
          <div class="brandSub">Bare-bones demo (FastAPI + SQLModel + JWT)</div>
        </div>
        <div class="nav">
          <a href="{{ base_path }}/register">Register</a>
          <a href="{{ base_path }}/login">Login</a>
        </div>
      </div>
      {% block body %}{% endblock %}
    </div>
  </body>
</html>
