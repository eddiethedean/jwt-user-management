{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block body %}
  <div class="card">
    <h2>Login</h2>
    <p class="muted">Sign in to get a JWT.</p>

    {% if error %}
      <div class="err">{{ error }}</div>
    {% endif %}
    {% if success %}
      <div class="ok">{{ success }}</div>
    {% endif %}

    <form method="post" action="{{ base_path }}/login">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" autocomplete="email" placeholder="name@example.com" required />

      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required />

      <button type="submit">Sign in</button>
    </form>

    <p class="muted" style="margin-bottom: 0;">No account? <a href="{{ base_path }}/register">Register</a></p>
  </div>
{% endblock %}
