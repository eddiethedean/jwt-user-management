{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block body %}
  <div class="card">
    <h2>Register</h2>
    <p class="muted">Enter your email and we’ll send you a link to set your password.</p>

    {% if error %}
      <div class="err">{{ error }}</div>
    {% endif %}

    <form method="post" action="{{ base_path }}/register">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" autocomplete="email" placeholder="name@example.com" required />

      <button type="submit">Send setup link</button>
    </form>
  </div>
{% endblock %}
