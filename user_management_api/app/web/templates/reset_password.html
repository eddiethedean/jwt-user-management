{% extends "base.html" %}
{% block title %}Reset password{% endblock %}
{% block body %}
  <div class="card">
    <h2>Reset password</h2>
    <p class="muted">Choose a new password for your account.</p>

    {% if error %}
      <div class="err">{{ error }}</div>
    {% endif %}

    <form method="post" action="{{ base_path }}/password/reset-form">
      <input type="hidden" name="token" value="{{ token }}" />

      <label for="email">Email</label>
      <input
        id="email"
        type="email"
        value="{{ reset_email or '' }}"
        readonly
        aria-readonly="true"
      />
      <div class="muted" style="margin-top: 6px;">This reset link is tied to this email address.</div>

      <label for="password">New password</label>
      <input id="password" name="password" type="password" autocomplete="new-password" required />

      <button type="submit">Reset password</button>
    </form>
  </div>
{% endblock %}
